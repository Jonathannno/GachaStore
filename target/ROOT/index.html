<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>GachaStore | Arknights Goods Marketplace</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">

    <style>
        :root {
            --primary-blue: #3498db;
            --success-green: #2ecc71;
            --glass-white: rgba(255, 255, 255, 0.85);
        }

        body {
            background: linear-gradient(rgba(0,0,0,0.3), rgba(0,0,0,0.3)), 
                        url("https://i.redd.it/wehif1rowai41.jpg") no-repeat center center fixed;
            background-size: cover;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            height: 100vh;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .main-container {
            text-align: center;
            background: var(--glass-white);
            padding: 50px 40px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.3);
            backdrop-filter: blur(5px);
            max-width: 500px;
            width: 90%;
            border: 1px solid rgba(255,255,255,0.3);
        }

        .logo {
            width: 100%;
            max-width: 350px;
            margin-bottom: 20px;
            filter: drop-shadow(2px 4px 6px rgba(0,0,0,0.1));
        }

        h1 {
            font-weight: 700;
            color: #2c3e50;
            margin-bottom: 10px;
            font-size: 1.8rem;
        }

        .highlight {
            color: var(--primary-blue);
        }

        p {
            color: #7f8c8d;
            margin-bottom: 30px;
            font-style: italic;
        }

        .btn-group-custom {
            display: flex;
            flex-direction: column;
            gap: 15px;
            align-items: center;
        }

        .big-btn {
            width: 100%;
            max-width: 280px;
            padding: 12px;
            font-size: 18px;
            font-weight: 600;
            border-radius: 8px;
            transition: transform 0.2s, box-shadow 0.2s;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .big-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        .footer-text {
            margin-top: 25px;
            font-size: 0.8rem;
            color: #bdc3c7;
        }
    </style>
</head>
<body>

<div class="main-container">
    <img src="images/Arknights_Logo.png" class="logo" alt="Arknights Logo">

    <h1>Welcome to <span class="highlight">GachaStore</span></h1>
    <p>Premium Arknights Collectibles</p>

    <div class="btn-group-custom">
        <button class="btn btn-primary big-btn" onclick="window.location.href='login.jsp'">
            Member Login
        </button>

        <button class="btn btn-outline-success big-btn" onclick="window.location.href='register.jsp'">
            Create Account
        </button>
    </div>

    <div class="footer-text">
        © 2024 GachaStore | Official Merchandise Partner
    </div>
</div>

</body>
</html>
